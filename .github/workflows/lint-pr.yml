name: Lint translations

on:
  workflow_dispatch:
  pull_request:
    paths:
      - sources/**
      - translations/**

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run Translation Linter
        run: python scripts/lint_translations.py
