name: Build, release and deploy

on:
  push:
    branches: [main]
    paths:
      - sources/**
      - translations/**
      - scripts/**
      - public/**
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GitHub Pages"
        required: false
        default: "true"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Generate Summary
        run: |
          set -euo pipefail
          python scripts/generate_summaries.py

      - name: Copy Translations
        run: |
          set -euo pipefail
          mkdir -p public/translations/
          cp -r translations/* public/translations/
          cp sources/projects.json public/projects.json

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "$TAG" > public/version.txt

          # JSON version (for frontend)
          echo "{\"version\":\"$TAG\",\"commit\":\"${GITHUB_SHA}\"}" > public/version.json

      - name: Upload public folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-folder
          path: public
          retention-days: 1

  release:
    if: needs.build.outputs.tag != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Download public folder artifact
        uses: actions/download-artifact@v8
        with:
          name: public-folder
          path: public

      - name: Create Project Translation Exports
        run: |
          set -euo pipefail
          cp public/projects.json translations/projects.json
          python scripts/export_translations.py

      - name: Upload Translation Zips to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Translations ${{ needs.build.outputs.tag }}
          tag_name: ${{ needs.build.outputs.tag }}
          make_latest: true
          body: |
            Translation export snapshot.

            Commit: ${{ github.sha }}
            Run: ${{ github.run_id }}
          files: exports/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: needs.build.outputs.tag != '' && (github.event_name != 'workflow_dispatch' || inputs.deploy == 'true')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download public folder artifact
        uses: actions/download-artifact@v8
        with:
          name: public-folder
          path: public

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5