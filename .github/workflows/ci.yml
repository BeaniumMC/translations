name: Build & Release & Deploy

on:
  push:
    branches: [main]
    paths:
      - sources/**
      - translations/**
      - scripts/**
      - public/**
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GitHub Pages"
        required: false
        default: "true"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate Summary
        run: |
          set -euo pipefail
          python scripts/generate_summaries.py

      - name: Copy Translations
        run: |
          set -euo pipefail
          mkdir -p public/translations/
          cp -r translations/* public/translations/
          cp sources/projects.json public/projects.json

      - name: Upload public folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-folder
          path: public
          retention-days: 1

  export:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download public folder artifact
        uses: actions/download-artifact@v8
        with:
          name: public-folder
          path: public

      - name: Create Project Translation Exports
        run: |
          set -euo pipefail
          cp public/projects.json translations/projects.json
          python scripts/export_translations.py

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Upload Translation Zips to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Translations ${{ steps.tag.outputs.tag }}
          prerelease: false
          body: |
            Translation export snapshot.
            Commit: ${{ github.sha }}
            Run: ${{ github.run_id }}
          files: exports/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    if: github.event_name != 'workflow_dispatch' || inputs.deploy == 'true'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download public folder artifact
        uses: actions/download-artifact@v8
        with:
          name: public-folder
          path: public

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
